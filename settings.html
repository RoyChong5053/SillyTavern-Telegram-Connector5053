<!-- settings.html -->
<div class="telegram-connector-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Telegram Connector 设置</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="telegram-connector_block flex-container">
                <label for="telegram_bridge_url">Bridge 服务器 WebSocket URL</label>
                <input type="text" id="telegram_bridge_url" class="text_pole" placeholder="例如：ws://127.0.0.1:8080">
                <div id="telegram_connection_status" style="margin-top: 10px; font-weight: bold;">状态： 请点击连接按钮</div>
            </div>

            <div class="telegram-connector_block flex-container">
                <input id="telegram_connect_button" class="menu_button" type="button" value="连接" />
                <input id="telegram_disconnect_button" class="menu_button" type="button" value="断开" />
            </div>

            <div class="telegram-connector_block flex-container">
                <label class="checkbox_label" for="telegram_auto_connect">
                    <input type="checkbox" id="telegram_auto_connect">
                    <span>页面加载时自动连接</span>
                </label>
            </div>

            <hr class="sysHR" />

            <div class="telegram-connector_block flex-container">
                <label class="checkbox_label" for="telegram_enable_whitelist">
                    <input type="checkbox" id="telegram_enable_whitelist">
                    <span>启用用户白名单</span>
                </label>
            </div>

            <div class="telegram-connector_block flex-container">
                <label for="telegram_user_whitelist">用户白名单（Telegram User IDs，逗号分隔）</label>
                <textarea id="telegram_user_whitelist" class="text_pole" rows="3" placeholder="例如：123456789,987654321"></textarea>
                <small style="color: #666;">留空表示允许所有用户访问</small>
            </div>

            <hr class="sysHR" />

            <div class="telegram-connector_block flex-container">
                <label class="checkbox_label" for="telegram_enable_connection_notifications">
                    <input type="checkbox" id="telegram_enable_connection_notifications">
                    <span>启用连接状态通知</span>
                </label>
            </div>

            <div class="telegram-connector_block flex-container">
                <label class="checkbox_label" for="telegram_enable_generation_notifications">
                    <input type="checkbox" id="telegram_enable_generation_notifications">
                    <span>启用生成状态通知</span>
                </label>
            </div>

            <div class="telegram-connector_block flex-container">
                <label class="checkbox_label" for="telegram_enable_error_notifications">
                    <input type="checkbox" id="telegram_enable_error_notifications">
                    <span>启用错误通知</span>
                </label>
            </div>

            <hr class="sysHR" />
        </div>
    </div>
</div>
